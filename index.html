<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading...</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f3dbe6;
    font-family: Arial, sans-serif;
    overflow: hidden;
}

/* Floating hearts container */
.background-hearts {
    position: absolute;
    width: 100%;
    height: 100%;
    pointer-events: none;
}

.background-hearts span {
    position: absolute;
    font-size: 24px;
    opacity: 0.2;
    animation: floatUp linear infinite;
}

/* Different positions & speeds */
.background-hearts span:nth-child(1) { left: 5%; animation-duration: 10s; }
.background-hearts span:nth-child(2) { left: 15%; animation-duration: 14s; font-size: 18px; }
.background-hearts span:nth-child(3) { left: 80%; animation-duration: 12s; }
.background-hearts span:nth-child(4) { left: 90%; animation-duration: 16s; font-size: 20px; }
.background-hearts span:nth-child(5) { left: 50%; animation-duration: 18s; font-size: 26px; }

@keyframes floatUp {
    0% { transform: translateY(100vh) rotate(0deg); }
    100% { transform: translateY(-10vh) rotate(360deg); }
}

.card {
    background: white;
    padding: 30px 20px;
    border-radius: 25px;
    text-align: center;
    width: 280px;
    box-shadow: 0 10px 30px rgba(214, 51, 132, 0.3);
    animation: fadeIn 1s ease, glow 2.5s infinite alternate;
    position: relative;
    z-index: 2;
}

@keyframes glow {
    from { box-shadow: 0 10px 30px rgba(214, 51, 132, 0.2); }
    to { box-shadow: 0 15px 40px rgba(214, 51, 132, 0.4); }
}

.hearts {
    font-size: 22px;
    margin-bottom: 10px;
    animation: bounce 1.5s infinite ease-in-out;
}

@keyframes bounce {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
}

h2 {
    color: #d63384;
    margin: 10px 0 20px 0;
}

/* Loading bar */
.loading-bar {
    width: 100%;
    height: 14px;
    background: #ffe6f0;
    border-radius: 50px;
    overflow: hidden;
    position: relative;
}

.loading-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #ff80ab, #d63384);
    border-radius: 50px;
    animation: load 7s forwards;
}

.loading-fill::after {
    content: "";
    position: absolute;
    top: 0;
    left: -40%;
    width: 40%;
    height: 100%;
    background: rgba(255,255,255,0.4);
    transform: skewX(-20deg);
    animation: shine 1.2s infinite;
}

@keyframes shine {
    0% { left: -40%; }
    100% { left: 120%; }
}

@keyframes load {
    from { width: 0%; }
    to { width: 100%; }
}

@keyframes fadeIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
}
</style>
</head>

<body>

<div class="background-hearts">
    <span>💖</span>
    <span>💗</span>
    <span>💜</span>
    <span>💕</span>
    <span>✨</span>
</div>

<div class="card">
    <div class="hearts">💖 💗 💜</div>
    <h2>Loading something special...</h2>

    <div class="loading-bar">
        <div class="loading-fill"></div>
    </div>
</div>

<script>
setTimeout(function() {
    window.location.href = "b1.html";
}, 7000);
</script>

</body>
</html>
